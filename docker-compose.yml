version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: tnp_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tnp_portal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tnp_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: tnp_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/tnp_portal
      SECRET_KEY: change-this
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      BREVO_API_KEY: your_key
      BREVO_SENDER_EMAIL: tnp@college.edu
      ENV: development
      GROQ_API_KEY: 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
      CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:80,http://localhost"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: tnp_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
